name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Restore local tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore

      - name: Install PostCSS dependencies
        run: npm install --prefix site

      - name: Build
        run: dotnet build Axial.slnx --configuration Release --no-restore --nologo -v minimal

      - name: Test
        run: dotnet test tests/Axial.Tests/Axial.Tests.fsproj --configuration Release --no-build --nologo -v minimal

      - name: Determine package version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "package_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "package_version=0.7.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack libraries
        run: bash scripts/pack.sh -v "${{ steps.version.outputs.package_version }}"

      - name: Build docs site
        run: bash scripts/build-docs-site.sh

      - name: Archive package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/package/
          if-no-files-found: error

      - name: Archive generated docs
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: output/
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/package/*.nupkg
            artifacts/package/*.snupkg

  publish-nuget:
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    environment: nuget
    permissions:
      contents: read

    steps:
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: artifacts/package

      - name: Publish NuGet packages
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          for package in artifacts/package/*.nupkg; do
            dotnet nuget push "$package" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Publish NuGet symbol packages
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          for package in artifacts/package/*.snupkg; do
            [ -e "$package" ] || continue
            dotnet nuget push "$package" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

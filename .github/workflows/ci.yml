name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Restore local tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore

      - name: Check source inventory
        run: bash scripts/check-source-inventory.sh

      - name: Build
        run: dotnet build Axial.slnx --configuration Release --no-restore --nologo -v minimal

      - name: Test
        run: dotnet test Axial.slnx --configuration Release --no-build --nologo -v minimal

      - name: Compile Fable JavaScript surface
        run: bash scripts/check-fable-js-surface.sh

      - name: Run main example
        run: dotnet run --project examples/Axial.Examples/Axial.Examples.fsproj --configuration Release --no-build --nologo

      - name: Run maintenance example
        run: dotnet run --project examples/Axial.MaintenanceExamples/Axial.MaintenanceExamples.fsproj --configuration Release --no-build --nologo

      - name: Publish and run NativeAOT probe
        run: bash scripts/run-aot-probe.sh

      - name: Pack libraries
        run: bash scripts/pack.sh

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Restore local tools
        run: dotnet tool restore

      - name: Restore .NET
        run: dotnet restore

      - name: Install PostCSS dependencies
        run: npm install --prefix site

      - name: Build docs site
        run: bash scripts/build-docs-site.sh

      - name: Prepare Pages artifact
        run: touch output/.nojekyll

      - name: Upload generated docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: output/
          if-no-files-found: error
